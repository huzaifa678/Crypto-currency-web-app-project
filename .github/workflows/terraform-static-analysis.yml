name: Terraform Static Analysis

on:
  push:
    branches:
      - main
    paths:
      - terraform/**
      - .github/workflows/terraform-static-analysis.yml
  pull_request:
    branches:
      - main
    paths:
      - terraform/**
      - .github/workflows/terraform-static-analysis.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: v0.59.1

      - name: Show TFLint version
        run: tflint --version

      - name: Init TFLint (download plugins)
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run TFLint
        run: tflint --recursive --format compact

  checkov:
    name: Checkov
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          config_file: terraform/.checkov.yaml
          framework: terraform
          output_format: cli,sarif
          output_file_path: console,checkov-results.sarif
          soft_fail: false

  opa-policy:
    name: OPA Policy Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Conftest
        uses: open-policy-agent/setup-conftest@v0.2.0
        with:
          version: v0.56.0

      - name: Verify Rego policies (unit tests)
        run: conftest verify --policy policy

      - name: Lint Rego policies
        run: conftest fmt --check policy
