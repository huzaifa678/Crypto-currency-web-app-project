version: "2"

run:
  timeout: 5m
  tests: false

linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - revive
    - unused

  settings:
    revive:
      rules:
        - name: var-naming
        - name: line-length-limit
          arguments: [120]

issues:
  max-issues-per-linter: 0
  max-same-issues: 0